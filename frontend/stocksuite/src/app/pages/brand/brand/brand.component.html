<div class="container">
  <div class="container text-center m-3">
    <h2>Brands List</h2>
  </div>

  <div class="row">
    <form
      #brandForm="ngForm"
      (ngSubmit)="searchBrand()"
      class="row mb-3 text-center col-md-6"
    >
      <div class="col-md-10">
        <input
          type="text"
          class="form-control"
          id="searchBrand"
          placeholder="Enter brand name and press enter to search"
          [(ngModel)]="searchTerm"
          name="searchTerm"
          (keyup.enter)="searchBrand()"
        />
      </div>

      <div class="col-md-2">
        <button type="submit" class="btn btn-outline-primary btn-sm">
          Search
        </button>
      </div>
    </form>

    <div class="col-md-2">
      <button class="btn btn-outline-success btn-sm" (click)="toNewBrand()">
        New Brand
      </button>
    </div>
  </div>
  <div class="row">
    <div class="col-md-8">
      <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th
              scope="col"
              class="sortable"
              (click)="sortColumn('id')"
              (keydown.enter)="sortColumn('id')"
              tabindex="0"
            >
              #Id
              <span *ngIf="sortedColumn === 'id'" class="arrow">
                {{ isAscendingOrder ? "↑" : "↓" }}
              </span>
            </th>

            <th scope="col">Image</th>

            <th
              scope="col"
              class="sortable"
              (click)="sortColumn('name')"
              (keydown.enter)="sortColumn('name')"
              tabindex="0"
            >
              Name
              <span *ngIf="sortedColumn === 'name'" class="arrow">
                {{ isAscendingOrder ? "↑" : "↓" }}</span
              >
            </th>
          </tr>
        </thead>
        <tbody>
          @for (brand of filteredBrandList; track $index){
          <tr></tr>

          <tr
            (click)="selectionMode === 'click' ? onBrandInteract(brand) : null"
            (keydown.enter)="
              selectionMode === 'click' ? onBrandInteract(brand) : null
            "
          >
            <td>{{ brand.id }}</td>
            <td>
              @if (brand.imageUrl != null){
              <img [src]="brand.imageUrl" alt="" width="50px" height="50px" />
              } @else{
              <img
                src="../../../../assets/images/no-image-100.png"
                alt=""
                width="50px"
                height="50px"
              />
              }
            </td>
            <td>{{ brand.name }}</td>
          </tr>
          }
        </tbody>
      </table>
    </div>
    @if(createBrand){

    <div class="col-md-4">
      <div class="card shadow">
        <app-brand-create (onCancel)="createBrand = false"></app-brand-create>
      </div>
    </div>
    } @if( selectedBrand){
    <div class="col-md-4">
      <div class="card shadow">
        <app-brand-details [brand]="selectedBrand"></app-brand-details>
      </div>
    </div>
    }
  </div>
</div>
